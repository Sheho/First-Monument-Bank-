<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Monument Bank</title>
    <style id="google-translate-override">
      .goog-te-gadget { font-size: 0px !important; color: transparent !important; }
      .goog-te-gadget .goog-te-combo { font-size: 14px !important; color: #0f172a !important; background-color: #ffffff !important; border: 1px solid #e2e8f0 !important; border-radius: 6px !important; padding: 6px 10px !important; margin: 0 !important; outline: none !important; cursor: pointer; display: inline-block !important; height: 34px !important; }
      .goog-te-gadget .goog-te-combo option { color: #0f172a !important; background-color: #ffffff !important; }
      .goog-logo-link, .goog-te-gadget > span > a, .VIpgJd-ZVi9od-ORHb-OEVmcd, .goog-te-banner-frame { display: none !important; }
      body { top: 0 !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        var el = document.getElementById('google_translate_element');
        if (!el) {
          setTimeout(googleTranslateElementInit, 100);
          return;
        }
        if (el.innerHTML.length > 0) return;
        new google.translate.TranslateElement({
          pageLanguage: 'en'
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
